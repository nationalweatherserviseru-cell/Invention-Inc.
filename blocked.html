<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invention Inc. - Блокировка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <main class="blocked-page">
        <div class="blocked-container">
            <div class="blocked-icon">⚠</div>
            <h1 class="blocked-title" data-i18n="blocked.title">Ваш аккаунт был заблокирован</h1>
            <p class="blocked-message" data-i18n="blocked.message">Для подачи апелляции перейдите в наш Discord канал</p>
            <a href="https://discord.gg/invention-inc" class="discord-link" target="_blank" data-i18n="blocked.button">Присоединиться к Discord</a>
            <p class="blocked-footer">Invention Inc.</p>
        </div>
    </main>

    <script src="languages.js"></script>
    <script src="script.js"></script>
</body>
</html>
